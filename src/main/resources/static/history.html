<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History - XO Arcade</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Supabase Client JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR PLACEHOLDER -->
<div id="navbar-placeholder"></div>

<div class="main-content container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            
            <!-- HEADER AND FILTER BAR -->
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 pb-2 border-bottom border-secondary gap-3">
                <h3 class="fw-bold text-neon-cyan m-0">
                    <i class="bi bi-clock-history me-2"></i>MATCH HISTORIES
                </h3>
                
                <!-- Filters Tabs -->
                <div class="btn-group bg-dark-glass p-1 rounded border border-secondary" role="group" aria-label="Outcome Filters">
                    <button onclick="setFilter('ALL')" id="filter-ALL" class="btn btn-sm btn-neon-cyan px-3 py-2">
                        ALL
                    </button>
                    <button onclick="setFilter('WIN')" id="filter-WIN" class="btn btn-sm btn-outline-dark text-muted-custom border-0 px-3 py-2">
                        WINS
                    </button>
                    <button onclick="setFilter('LOSS')" id="filter-LOSS" class="btn btn-sm btn-outline-dark text-muted-custom border-0 px-3 py-2">
                        LOSSES
                    </button>
                    <button onclick="setFilter('DRAW')" id="filter-DRAW" class="btn btn-sm btn-outline-dark text-muted-custom border-0 px-3 py-2">
                        DRAWS
                    </button>
                </div>
            </div>

            <!-- HISTORY DATA LIST -->
            <div class="card bg-dark-card border-secondary">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark table-striped table-hover align-middle mb-0 text-center" style="--bs-table-bg: transparent; --bs-table-striped-bg: rgba(255,255,255,0.02);">
                            <thead>
                                <tr class="border-secondary text-muted-custom small">
                                    <th scope="col" class="py-3">DATE / TIME</th>
                                    <th scope="col" class="py-3">OPPONENT</th>
                                    <th scope="col" class="py-3">RESULT</th>
                                    <th scope="col" class="py-3">MOVES</th>
                                    <th scope="col" class="py-3">WINNER</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body">
                                <tr>
                                    <td colspan="5" class="py-5 text-muted-custom">
                                        <div class="spinner-border text-neon-cyan" role="status"></div>
                                        <span class="ms-2">Loading match history...</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <a href="/dashboard" class="btn btn-neon-cyan py-2 px-4">
                    <i class="bi bi-grid-1x2-fill me-2"></i> Back to Dashboard
                </a>
            </div>
            
        </div>
    </div>
</div>

<!-- FOOTER PLACEHOLDER -->
<div id="footer-placeholder"></div>

<!-- CHALLENGE MODAL PLACEHOLDER -->
<div id="challenge-modal-placeholder"></div>

<!-- Global Toast Container -->
<div class="toast-container-custom" id="toastContainer"></div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SockJS and STOMP for Realtime WebSockets -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<!-- Shared App JS -->
<script src="/static/js/auth.js?v=2"></script>
<script src="/static/js/main.js"></script>

<script>
    let currentFilter = 'ALL';

    async function fetchHistory() {
        const tbody = document.getElementById('history-table-body');
        try {
            const response = await fetch(`/api/history?filter=${currentFilter}`);
            if (!response.ok) throw new Error("Failed to load");
            const historyList = await response.json();

            if (historyList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-5 text-muted-custom">
                            <i class="bi bi-calendar-x fs-1 text-secondary mb-3 d-block"></i>
                            <h5>No Records Found</h5>
                            <p class="small mb-0">Matches you play on the grid will be archived here.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = '';
            historyList.forEach(match => {
                const tr = document.createElement('tr');
                tr.className = 'border-secondary';
                
                // Format Date
                const dateObj = new Date(match.playedDate);
                const localDateStr = dateObj.toLocaleDateString();
                const localTimeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                // Outcome Badge
                let resultBadge = '';
                if (match.result === 'WIN') {
                    resultBadge = '<span class="badge badge-win px-3 py-2 uppercase fw-bold tracking-wide">VICTORY</span>';
                } else if (match.result === 'LOSS') {
                    resultBadge = '<span class="badge badge-loss px-3 py-2 uppercase fw-bold tracking-wide">DEFEAT</span>';
                } else {
                    resultBadge = '<span class="badge badge-draw px-3 py-2 uppercase fw-bold tracking-wide">DRAW</span>';
                }

                // Winner
                const winnerText = match.winner 
                    ? `<span class="text-neon-cyan fw-semibold">${match.winner.username}</span>`
                    : `<span class="text-muted">—</span>`;

                tr.innerHTML = `
                    <td class="py-3 text-muted-custom small">
                        ${localDateStr} <br>
                        <span class="fs-8">${localTimeStr}</span>
                    </td>
                    <td class="py-3">
                        <div class="d-flex align-items-center justify-content-center gap-2">
                            <img src="${match.opponent.avatar || 'https://robohash.org/' + match.opponent.username + '.png?set=set4'}" class="rounded-circle" style="width: 32px; height: 32px;">
                            <span class="fw-semibold text-white small">${match.opponent.username}</span>
                        </div>
                    </td>
                    <td class="py-3">
                        ${resultBadge}
                    </td>
                    <td class="py-3 fw-bold text-light">
                        ${match.movesCount}
                    </td>
                    <td class="py-3 text-muted-custom small">
                        ${winnerText}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (err) {
            console.error(err);
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" class="py-5 text-danger">
                        <i class="bi bi-exclamation-triangle-fill fs-1 mb-3 d-block"></i>
                        <h5>Failed to load match history</h5>
                    </td>
                </tr>
            `;
        }
    }

    function setFilter(filter) {
        currentFilter = filter;
        
        // Reset active filter classes
        const filters = ['ALL', 'WIN', 'LOSS', 'DRAW'];
        filters.forEach(f => {
            const btn = document.getElementById(`filter-${f}`);
            if (btn) {
                if (f === filter) {
                    btn.className = `btn btn-sm ${filter === 'WIN' ? 'btn-neon-cyan' : filter === 'LOSS' ? 'btn-neon-pink' : filter === 'DRAW' ? 'btn-neon-purple' : 'btn-neon-cyan'} px-3 py-2`;
                } else {
                    btn.className = 'btn btn-sm btn-outline-dark text-muted-custom border-0 px-3 py-2';
                }
            }
        });

        fetchHistory();
    }

    document.addEventListener('userReady', () => {
        fetchHistory();
    });
</script>
</body>
</html>
