<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Arena - XO Arcade</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Supabase Client JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR PLACEHOLDER -->
<div id="navbar-placeholder"></div>

<div class="main-content container py-4">
    <!-- Game Board Styling -->
    <div class="row justify-content-center g-4">
        <!-- PLAYERS STATUS BAR -->
        <div class="col-12 col-md-10 text-center mb-2">
            <div class="game-status-bar d-flex justify-content-between align-items-center bg-dark-glass border border-secondary p-3 px-4 shadow">
                
                <!-- PLAYER X CARD -->
                <div class="player-status-card player-x-card d-flex align-items-center gap-2 text-start">
                    <img id="playerX-avatar" src="https://robohash.org/playerx.png?set=set4" 
                         class="rounded-circle border border-2 border-neon-cyan" 
                         style="width: 45px; height: 45px; object-fit: cover;">
                    <div>
                        <span class="fw-bold text-neon-cyan d-block" id="playerX-username">Player X</span>
                        <span class="text-muted-custom fs-8">SYMBOL: X</span>
                    </div>
                </div>

                <!-- VS AND STATUS -->
                <div class="vs-status-container text-center">
                    <span class="badge bg-dark-glass border border-secondary text-muted-custom px-3 py-2 fs-6 mx-2">
                        VS
                    </span>
                    <span id="turnIndicator" class="badge bg-info text-dark px-3 py-2 fs-6 pulse-glow">
                        WAITING...
                    </span>
                </div>

                <!-- PLAYER O CARD -->
                <div class="player-status-card player-o-card d-flex align-items-center gap-2 text-end flex-row-reverse">
                    <img id="playerO-avatar" src="https://robohash.org/playero.png?set=set4" 
                         class="rounded-circle border border-2 border-neon-pink" 
                         style="width: 45px; height: 45px; object-fit: cover;">
                    <div>
                        <span class="fw-bold text-neon-pink d-block" id="playerO-username">Player O</span>
                        <span class="text-muted-custom fs-8">SYMBOL: O</span>
                    </div>
                </div>

            </div>
        </div>

        <!-- MAIN GAME PANEL -->
        <div class="col-12 col-md-6 col-lg-5">
            
            <!-- BOARD CARD -->
            <div class="card bg-dark-card border-secondary p-3 p-sm-4 mb-4 text-center">
                
                <!-- GRID -->
                <div class="game-grid mb-4" id="boardGrid">
                    <div class="game-cell" data-index="0" onclick="makeCellMove(0)"></div>
                    <div class="game-cell" data-index="1" onclick="makeCellMove(1)"></div>
                    <div class="game-cell" data-index="2" onclick="makeCellMove(2)"></div>
                    <div class="game-cell" data-index="3" onclick="makeCellMove(3)"></div>
                    <div class="game-cell" data-index="4" onclick="makeCellMove(4)"></div>
                    <div class="game-cell" data-index="5" onclick="makeCellMove(5)"></div>
                    <div class="game-cell" data-index="6" onclick="makeCellMove(6)"></div>
                    <div class="game-cell" data-index="7" onclick="makeCellMove(7)"></div>
                    <div class="game-cell" data-index="8" onclick="makeCellMove(8)"></div>
                </div>

                <!-- MATCH ACTIONS -->
                <div class="d-flex gap-2">
                    <button onclick="leaveGameMatch()" class="btn btn-outline-danger w-100 py-2">
                        <i class="bi bi-box-arrow-left me-1"></i> FORFEIT MATCH
                    </button>
                </div>

            </div>

        </div>
    </div>
</div>

<!-- MATCH END MODAL -->
<div class="modal fade" id="matchEndModal" data-bs-backdrop="static" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark-card text-light border-neon-cyan" id="modalBorderContainer">
            <div class="modal-body text-center py-5">
                <h1 class="fw-extrabold text-neon-cyan mb-3" id="matchEndTitle">VICTORY!</h1>
                <p class="text-muted-custom fs-5 mb-4" id="matchEndMessage">You have successfully dominated the grid.</p>
                <div class="d-flex flex-column gap-2 px-4">
                    <button class="btn btn-neon-cyan py-3" onclick="requestRematch()" id="rematchBtn">PLAY AGAIN</button>
                    <a href="/dashboard" class="btn btn-outline-secondary py-2 text-muted-custom">BACK TO DASHBOARD</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER PLACEHOLDER -->
<div id="footer-placeholder"></div>

<!-- CHALLENGE MODAL PLACEHOLDER -->
<div id="challenge-modal-placeholder"></div>

<!-- Global Toast Container -->
<div class="toast-container-custom" id="toastContainer"></div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SockJS and STOMP for Realtime WebSockets -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<!-- Shared App JS -->
<script src="/static/js/auth.js?v=2"></script>
<script src="/static/js/main.js"></script>

<!-- Global variables to export into JavaScript -->
<script>
    var sessionId = window.location.pathname.split('/').pop();
    var currentUserId, playerXId, playerOId;
    var initialBoardState, initialGameStatus, initialCurrentTurnId, initialWinnerId;

    document.addEventListener('userReady', async (event) => {
        currentUserId = event.detail.user.id;
        
        try {
            const response = await fetch(`/api/game/session/${sessionId}`);
            if (!response.ok) {
                window.location.href = '/dashboard';
                return;
            }
            const session = await response.json();
            
            playerXId = session.playerX.id;
            playerOId = session.playerO ? session.playerO.id : '';
            initialBoardState = session.boardState;
            initialGameStatus = session.status;
            initialCurrentTurnId = session.currentTurn ? session.currentTurn.id : '';
            initialWinnerId = session.winner ? session.winner.id : '';
            
            // Populate X
            document.getElementById('playerX-avatar').src = session.playerX.avatar || 'https://robohash.org/' + session.playerX.username + '.png?set=set4';
            document.getElementById('playerX-username').innerText = session.playerX.username;
            
            // Populate O
            if (session.playerO) {
                document.getElementById('playerO-avatar').src = session.playerO.avatar || 'https://robohash.org/' + session.playerO.username + '.png?set=set4';
                document.getElementById('playerO-username').innerText = session.playerO.username;
            } else {
                document.getElementById('playerO-avatar').src = 'https://robohash.org/playero.png?set=set4';
                document.getElementById('playerO-username').innerText = 'Waiting...';
            }
            
            // Trigger gameplay loader
            initializeBoard();
            
        } catch (err) {
            console.error("Error loading session:", err);
            window.location.href = '/dashboard';
        }
    });
</script>

<!-- Gameplay JS -->
<script src="/static/js/game.js"></script>

</body>
</html>
