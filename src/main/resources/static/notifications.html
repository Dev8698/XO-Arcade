<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - XO Arcade</title>
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Supabase Client JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR PLACEHOLDER -->
<div id="navbar-placeholder"></div>

<div class="main-content container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            
            <!-- HEADER AND QUICK ACTION -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom border-secondary">
                <h3 class="fw-bold text-neon-cyan m-0">
                    <i class="bi bi-bell-fill me-2"></i>NOTIFICATIONS
                </h3>
                <button onclick="markAllNotificationsReadPage()" id="mark-all-read-header-btn" class="btn btn-sm btn-neon-pink d-none">
                    <i class="bi bi-check-all me-1"></i> MARK ALL READ
                </button>
            </div>

            <!-- NOTIFICATION CONTAINER -->
            <div class="card bg-dark-card border-secondary mb-4">
                <div class="card-body p-0">
                    <div class="list-group list-group-flush bg-transparent" id="notifications-page-list">
                        <div class="text-center text-muted-custom py-5">
                            <div class="spinner-border text-neon-cyan" role="status"></div>
                            <span class="ms-2">Loading notifications...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-center">
                <a href="/dashboard" class="btn btn-neon-cyan py-2 px-4">
                    <i class="bi bi-grid-1x2-fill me-2"></i> Back to Dashboard
                </a>
            </div>
            
        </div>
    </div>
</div>

<!-- FOOTER PLACEHOLDER -->
<div id="footer-placeholder"></div>

<!-- CHALLENGE MODAL PLACEHOLDER -->
<div id="challenge-modal-placeholder"></div>

<!-- Global Toast Container -->
<div class="toast-container-custom" id="toastContainer"></div>

<!-- Bootstrap 5 Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SockJS and STOMP for Realtime WebSockets -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<!-- Shared App JS -->
<script src="/static/js/auth.js?v=2"></script>
<script src="/static/js/main.js"></script>
<script src="/static/js/notifications.js"></script>

</body>
</html>
